<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 12" width="100%" height="12" preserveAspectRatio="none">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <rect width="1200" height="1" y="5" fill="url(#divGrad)" opacity="0.8"/>
  <rect width="1200" height="3" y="4" fill="url(#divGrad)" opacity="0.3" filter="url(#blur)"/>
  <circle r="4" fill="#8b5cf6" cx="600" cy="6" opacity="0.9">
    <animate attributeName="cx" values="0;1200;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
