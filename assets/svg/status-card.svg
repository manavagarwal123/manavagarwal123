<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" width="420" height="180">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="sg">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Card background -->
  <rect x="1" y="1" width="418" height="178" rx="16" fill="url(#cg)" stroke="url(#border)" stroke-width="1"/>
  <!-- Glow corner -->
  <circle cx="20" cy="20" r="40" fill="#6366f1" opacity="0.04" filter="url(#sg)"/>
  <!-- Title -->
  <text x="24" y="36" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#a5b4fc">⚡ Currently</text>
  <!-- Items -->
  <text x="24" y="62" font-family="'Segoe UI', monospace" font-size="12" fill="#c4b5fd">🤖  Building Multi-Agent AI (CrewAI + LangGraph)</text>
  <text x="24" y="84" font-family="'Segoe UI', monospace" font-size="12" fill="#c4b5fd">🔗  RAG Pipelines · LlamaIndex · ChromaDB</text>
  <text x="24" y="106" font-family="'Segoe UI', monospace" font-size="12" fill="#c4b5fd">🌐  MCP — Model Context Protocol integrations</text>
  <text x="24" y="128" font-family="'Segoe UI', monospace" font-size="12" fill="#c4b5fd">☁️   Azure ML production deployment</text>
  <text x="24" y="150" font-family="'Segoe UI', monospace" font-size="12" fill="#c4b5fd">📝  Writing Research Paper #4</text>
  <!-- Animated dot -->
  <circle cx="390" cy="30" r="5" fill="#10b981">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="376" y="55" font-family="'Segoe UI', sans-serif" font-size="9" fill="#6b7280">OPEN TO</text>
  <text x="370" y="68" font-family="'Segoe UI', sans-serif" font-size="9" fill="#6b7280">COLLABS</text>
</svg>
