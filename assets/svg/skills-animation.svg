<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 80" width="700" height="80">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Skill pills that animate in -->
  <rect x="5" y="20" width="90" height="30" rx="15" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="50" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#a5b4fc" font-weight="600">Python</text>

  <rect x="105" y="20" width="80" height="30" rx="15" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.25;0.1;0.25" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="145" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#c4b5fd" font-weight="600">PyTorch</text>

  <rect x="195" y="20" width="110" height="30" rx="15" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="250" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#67e8f9" font-weight="600">TensorFlow</text>

  <rect x="315" y="20" width="100" height="30" rx="15" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.2;0.05;0.2" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <text x="365" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#a5b4fc" font-weight="600">LangChain</text>

  <rect x="425" y="20" width="80" height="30" rx="15" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.05;0.25;0.05" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <text x="465" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#c4b5fd" font-weight="600">FastAPI</text>

  <rect x="515" y="20" width="75" height="30" rx="15" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.2;0.05;0.2" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <text x="552" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#67e8f9" font-weight="600">Azure</text>

  <rect x="600" y="20" width="90" height="30" rx="15" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-width="1">
    <animate attributeName="fill-opacity" values="0.1;0.3;0.1" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <text x="645" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ddd6fe" font-weight="600">CrewAI</text>
</svg>
