name: 🐍 Contribution Snake

on:
  schedule:
    # Runs twice daily — keeps the snake fresh
    - cron: "0 6,18 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-snake:
    name: Generate Contribution Snake SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate snake (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#6366f1&color_dots=#8b5cf6,#a78bfa,#c4b5fd,#ddd6fe

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "ci: update contribution snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
