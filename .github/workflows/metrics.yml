name: 📊 GitHub Metrics

on:
  schedule:
    - cron: "0 1 * * *"   # 1 AM UTC daily
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  metrics:
    name: Generate All Metric SVGs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      # ────────────────────────────────────────────────
      # 1 · Base profile: header + activity + community
      # ────────────────────────────────────────────────
      - name: Base Metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manavagarwal123
          filename: assets/metrics/base.svg
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          config_timezone: Asia/Kolkata
          config_display: large
          config_animations: yes
          config_padding: 6%, 10%

      # ────────────────────────────────────────────────
      # 2 · Language breakdown
      # ────────────────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manavagarwal123
          filename: assets/metrics/languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_indepth: yes
          config_timezone: Asia/Kolkata

      # ────────────────────────────────────────────────
      # 3 · Contribution calendar
      # ────────────────────────────────────────────────
      - name: Calendar
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manavagarwal123
          filename: assets/metrics/calendar.svg
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 2
          config_timezone: Asia/Kolkata

      # ────────────────────────────────────────────────
      # 4 · Coding habits & schedules
      # ────────────────────────────────────────────────
      - name: Habits
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manavagarwal123
          filename: assets/metrics/habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          config_timezone: Asia/Kolkata

      # ────────────────────────────────────────────────
      # 5 · Starred repos
      # ────────────────────────────────────────────────
      - name: Stars
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manavagarwal123
          filename: assets/metrics/stars.svg
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 6
          config_timezone: Asia/Kolkata

      # ────────────────────────────────────────────────
      # 6 · Commit and push
      # ────────────────────────────────────────────────
      - name: Commit metrics
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add assets/metrics/
          git diff --staged --quiet || \
            git commit -m "ci: update metrics svgs [skip ci]" && git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
