name: 🔄 Daily README Refresh

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Refresh Profile Data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README timestamp
        run: |
          DATE=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          sed -i "s/<!-- LAST_UPDATED -->.*<!-- END_UPDATED -->/<!-- LAST_UPDATED -->🕐 Last refreshed: ${DATE}<!-- END_UPDATED -->/" README.md || true

      - name: Push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-refresh profile [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
