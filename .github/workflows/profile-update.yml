name: 🔄 Daily Profile Refresh

on:
  schedule:
    - cron: "30 5 * * *"   # 5:30 AM UTC = 11 AM IST
  workflow_dispatch:

jobs:
  refresh:
    name: Refresh Dynamic Profile Content
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Stamp refresh timestamp
        run: |
          DATE=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          sed -i \
            "s|<!-- LAST_UPDATED -->.*<!-- END_UPDATED -->|<!-- LAST_UPDATED -->🕐 Last refreshed: ${DATE}<!-- END_UPDATED -->|g" \
            README.md || true

      - name: Commit if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || \
            git commit -m "ci: daily profile refresh [skip ci]" && git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
